<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mystery MSS-09R07M</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1e26;
      --card: #22273200;
      --accent: #00c8e0;
      --text: #f1f5f9;
      --muted: #64748b;
      --warn: #ef4444;
      --ok: #22c55e;
      --btn: #252b36;
      --btn-hover: #2e3747;
      --btn-active: #0e7490;
      --border: #2d3748;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .panel {
      width: min(400px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0e7490 0%, #0f5f75 100%);
      padding: 16px 20px 14px;
    }
    .header-title { font-size: 1rem; font-weight: 600; color: #e0f7fa; letter-spacing: 0.05em; }
    .header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 2px; }

    /* Sensors */
    .sensors {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #1e2330;
    }
    .sensor-block {
      flex: 1;
      text-align: center;
    }
    .sensor-block + .sensor-block {
      border-left: 1px solid var(--border);
    }
    .sensor-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .sensor-val { font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.2; margin-top: 2px; }
    .sensor-val span { font-size: 0.8rem; color: var(--muted); font-weight: 400; }

    /* Temp control */
    .temp-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #1a1f2b;
    }
    .temp-btn {
      width: 44px; height: 44px;
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .08s;
      flex-shrink: 0;
    }
    .temp-btn:active { transform: scale(0.92); background: var(--btn-active); }
    .temp-display {
      text-align: center;
      min-width: 90px;
    }
    .temp-display-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .temp-display-val { font-size: 2.4rem; font-weight: 700; color: var(--accent); line-height: 1.1; }
    .temp-display-val span { font-size: 1rem; color: var(--muted); }

    /* Buttons grid */
    .controls { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .ctrl-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-left: 2px; }

    .power-btn {
      width: 100%;
      padding: 14px;
      border: 2px solid #ef4444;
      background: rgba(239,68,68,0.08);
      color: #ef4444;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background .15s, transform .08s;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .power-btn.on {
      border-color: var(--ok);
      background: rgba(34,197,94,0.12);
      color: var(--ok);
    }
    .power-btn:active { transform: scale(0.98); }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .btn-row:last-child { margin-bottom: 0; }

    .ctrl-btn {
      padding: 12px 8px;
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .08s, border-color .15s;
      text-align: center;
    }
    .ctrl-btn:active { transform: scale(0.96); }
    .ctrl-btn:hover { background: var(--btn-hover); }
    .ctrl-btn.active {
      background: rgba(14, 116, 144, 0.3);
      border-color: var(--accent);
      color: var(--accent);
    }
    .ctrl-btn .btn-val {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .ctrl-btn.active .btn-val { color: var(--accent); opacity: 0.8; }

    /* Indicators */
    .indicators { padding: 14px 16px 18px; }
    .ind-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-left: 2px; }
    .ind-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .ind-item {
      text-align: center;
      padding: 8px 4px 6px;
      background: #1e2330;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .ind-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      margin: 0 auto 5px;
      background: #2d3748;
      box-shadow: none;
      transition: background .3s, box-shadow .3s;
    }
    .ind-dot.on-green {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.7);
    }
    .ind-dot.on-cyan {
      background: #00c8e0;
      box-shadow: 0 0 8px rgba(0,200,224,0.7);
    }
    .ind-dot.on-red {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239,68,68,0.7);
    }
    .ind-dot.on-yellow {
      background: #eab308;
      box-shadow: 0 0 8px rgba(234,179,8,0.7);
    }
    .ind-name { font-size: 0.65rem; color: var(--muted); line-height: 1.2; }
    .ind-item.active .ind-name { color: var(--text); }
  </style>
</head>
<body>
  <main class="panel">
    <div class="header">
      <div class="header-title">Mystery MSS-09R07M</div>
      <div class="header-sub">Кондиционер · Управление</div>
    </div>

    <!-- Sensors -->
    <div class="sensors">
      <div class="sensor-block">
        <div class="sensor-label">В комнате</div>
        <div class="sensor-val" id="temp">--<span>°C</span></div>
      </div>
      <div class="sensor-block">
        <div class="sensor-label">Влажность</div>
        <div class="sensor-val" id="hum">--<span>%</span></div>
      </div>
    </div>

    <!-- Temp control -->
    <div class="temp-control">
      <button class="temp-btn" data-action="temp_down">−</button>
      <div class="temp-display">
        <div class="temp-display-label">Температура</div>
        <div class="temp-display-val" id="target">--<span>°C</span></div>
      </div>
      <button class="temp-btn" data-action="temp_up">+</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-label">Управление</div>

      <button class="power-btn" id="btn-power" data-action="power">
        <span>⏻</span> <span id="power-label">ВЫКЛ</span>
      </button>

      <div class="btn-row">
        <button class="ctrl-btn" data-action="mode" id="btn-mode">
          РЕЖИМ
          <div class="btn-val" id="val-mode">AUTO</div>
        </button>
        <button class="ctrl-btn" data-action="speed" id="btn-speed">
          СКОРОСТЬ
          <div class="btn-val" id="val-speed">HI</div>
        </button>
      </div>

      <div class="btn-row">
        <button class="ctrl-btn" data-action="sleep" id="btn-sleep">
          SLEEP
          <div class="btn-val" id="val-sleep">ВЫКЛ</div>
        </button>
        <button class="ctrl-btn" data-action="timer" id="btn-timer">
          ТАЙМЕР
          <div class="btn-val" id="val-timer">ВЫКЛ</div>
        </button>
      </div>
    </div>

    <!-- Indicators -->
    <div class="indicators">
      <div class="ind-label">Индикаторы</div>
      <div class="ind-grid">
        <div class="ind-item" id="ind-comp">
          <div class="ind-dot" id="dot-comp"></div>
          <div class="ind-name">КОМПР.</div>
        </div>
        <div class="ind-item" id="ind-auto">
          <div class="ind-dot" id="dot-auto"></div>
          <div class="ind-name">AUTO</div>
        </div>
        <div class="ind-item" id="ind-cool">
          <div class="ind-dot" id="dot-cool"></div>
          <div class="ind-name">ХОЛОД</div>
        </div>
        <div class="ind-item" id="ind-fan">
          <div class="ind-dot" id="dot-fan"></div>
          <div class="ind-name">ВЕНТ.</div>
        </div>
        <div class="ind-item" id="ind-hi">
          <div class="ind-dot" id="dot-hi"></div>
          <div class="ind-name">СКОР. HI</div>
        </div>
        <div class="ind-item" id="ind-low">
          <div class="ind-dot" id="dot-low"></div>
          <div class="ind-name">СКОР. LO</div>
        </div>
        <div class="ind-item" id="ind-water">
          <div class="ind-dot" id="dot-water"></div>
          <div class="ind-name">ВОДА</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const fmt = (v, d = 1) => typeof v === 'number' && !isNaN(v) ? v.toFixed(d) : '--';
    const modeNames = { auto: 'AUTO', cool: 'ХОЛОД', fan: 'ВЕНТ.' };

    function led(id, on, color = 'on-green') {
      const dot = document.getElementById('dot-' + id);
      const item = document.getElementById('ind-' + id);
      if (!dot) return;
      dot.className = 'ind-dot' + (on ? ' ' + color : '');
      item.classList.toggle('active', on);
    }

    function applyState(s) {
      // Sensors
      document.getElementById('temp').innerHTML = fmt(s.roomTemp) + '<span>°C</span>';
      document.getElementById('hum').innerHTML = fmt(s.roomHumidity) + '<span>%</span>';
      document.getElementById('target').innerHTML = (s.targetTemp ?? '--') + '<span>°C</span>';

      // Power
      const pBtn = document.getElementById('btn-power');
      document.getElementById('power-label').textContent = s.power ? 'ВКЛ' : 'ВЫКЛ';
      pBtn.classList.toggle('on', !!s.power);

      // Mode
      document.getElementById('val-mode').textContent = modeNames[s.mode] || s.mode?.toUpperCase() || '--';
      // Speed
      document.getElementById('val-speed').textContent = s.speed === 'hi' ? 'HI' : 'LOW';
      // Sleep
      document.getElementById('val-sleep').textContent = s.sleepMode ? 'ВКЛ' : 'ВЫКЛ';
      document.getElementById('btn-sleep').classList.toggle('active', !!s.sleepMode);
      // Timer
      document.getElementById('val-timer').textContent = s.timerActive ? 'ВКЛ' : 'ВЫКЛ';
      document.getElementById('btn-timer').classList.toggle('active', !!s.timerActive);

      // Indicators (LED)
      led('comp', s.compRunning, 'on-green');
      led('auto', s.mode === 'auto', 'on-cyan');
      led('cool', s.mode === 'cool', 'on-cyan');
      led('fan',  s.mode === 'fan',  'on-cyan');
      led('hi',   s.speed === 'hi',  'on-green');
      led('low',  s.speed === 'low', 'on-green');
      led('water', s.fullWater, 'on-red');
    }

    async function press(action) {
      try {
        await fetch(`/api/button/${action}`, { method: 'POST' });
        await refresh();
      } catch(e) { console.error(e); }
    }

    async function refresh() {
      try {
        const r = await fetch('/api/state');
        applyState(await r.json());
      } catch(e) {}
    }

    document.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => press(el.dataset.action));
    });

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
